name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.release.outputs.pr }}
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-plugin-bundle:
    # When release-please opens or updates a release PR, rebuild
    # packages/plugin/dist/cli.cjs on that branch so CI's "plugin bundle in
    # sync" check passes and the PR is mergeable.
    needs: release-please
    if: ${{ needs.release-please.outputs.pr }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release-please branch
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -C packages/shared build

      - name: Mirror CLI version into plugin.json
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          node -e "
            const fs = require('fs');
            const path = 'packages/plugin/.claude-plugin/plugin.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            data.version = '$version';
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
          "

      - run: pnpm -C packages/cli build

      - run: pnpm -C packages/plugin sync

      - name: Commit version mirror + rebuilt plugin bundle
        run: |
          if git diff --quiet -- packages/plugin; then
            echo "Plugin already in sync — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/plugin
          git commit -m "chore: sync plugin bundle and version"
          git push
